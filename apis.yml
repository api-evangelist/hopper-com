apis:
  - aid: hopper-com:hts-airline-api
    name: HTS Airline API
    description: >-
      The Hopper Technology Solutions Airline API lets airlines embed Hopper's
      ancillary fintech products — Cancel For Any Reason (CFAR) and Disruption
      Guarantee (DG) — directly into their booking flow. Airlines call the API
      to create a user session, request CFAR or DG offers for an itinerary,
      bind an offer into a contract, take payment, update itinerary slices,
      and later exercise the contract (cancel, refund, or rebook) on behalf
      of the customer. The API is OAuth2 Client Credentials authenticated,
      uses an HC-Session-ID correlation header, and exposes 23 operations
      under https://airlines-api.hopper.com/airline/v1.1.
    humanURL: https://github.com/hopper/hc-airlines-java
    baseURL: https://airlines-api.hopper.com/airline/v1.1
