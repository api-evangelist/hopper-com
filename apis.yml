aid: hopper-com
name: Hopper
description: >-
  Hopper is a Boston- and Montreal-based travel booking platform and B2B travel
  fintech provider serving more than 120 million travelers globally. Its
  consumer app aggregates flights, hotels, rental cars, and homes alongside
  proprietary price prediction and a family of "for any reason" fintech
  ancillaries — Price Freeze, Cancel For Any Reason (CFAR), Change For Any
  Reason, Leave For Any Reason, and Disruption Guarantee. Through its B2B
  division, Hopper Technology Solutions (HTS), the company licenses those same
  fintech ancillaries, agentic AI customer service (HTS Assist), white-label
  travel agency products (HTS Stays, HTS Cars, HTS Packages), and travel
  loyalty portals to airlines, banks, and travel providers. HTS exposes a
  documented OAuth2-secured REST API — the HTS Airline API v1.1 — for
  embedding CFAR and Disruption Guarantee contracts in airline booking flows,
  with OpenAPI-generated SDKs for Java, .NET, Angular, and iOS, plus a
  JavaScript SDK for hotel price-freeze integration.
